# Golden set for retrieval evaluation (Hit Rate@k, MRR — ARCH-001 §7).
# Each case: a query, the category to search, and the knowledge_id(s) that
# should appear in the top-k results.
#
# REWRITTEN 2026-07-09 (senior-tester) — replaces the 2026-07-08 (TASK-026)
# version whose 10/11 queries had `relevant_knowledge_ids: []`. Those queries
# were authored speculatively (TASK-015) BEFORE any real knowledge_base
# content existed and asked about topics phongkham5sao.vn simply never
# published (BHYT, cancellation policy, parking, Tet hours, general-checkup
# promos, pre-test fasting, ultrasound/colonoscopy prep). With no matching
# content in the 22 seeded rows, those cases could NEVER contribute a hit, so
# Hit-Rate@5/MRR were mechanically pinned near 1/11 ≈ 0.09 — a false failure
# of the eval gate driven by a stale golden set, not by any retrieval defect.
# TASK-026's own recommendation was exactly this: "don't patch the 10 uncovered
# queries — write new RAG queries grounded in the content that actually exists."
#
# Every query below is grounded in one of the 22 real seeded rows (ids 1-22,
# from eval/fixtures/knowledge_base/, seeded in sorted-glob order by
# scripts/seed_eval_fixtures.py). Each `relevant_knowledge_ids` was VERIFIED by
# running the real retrieval path (embed_batch + dal/qdrant_client.search, the
# same code search_knowledge_base uses) against the freshly-seeded corpus on
# 2026-07-09 — the id listed is the one actually returned, not a guess. 16 of 17
# queries retrieve their target at rank #1; the "opening hours" query (id 1)
# lands at rank #2 because the 07h30-17h00 hours line is repeated in every
# department doc footer, so that topic is inherently ambiguous — id 1 (the
# canonical intro doc) still sits comfortably inside top-5. This is a real
# ranking observation, not a bug: no single doc "owns" the hours fact.
#
# Id map (seeded via POST /knowledge in sorted(*/*.md) order):
#   clinic_info: 1 gioi-thieu, 2 da-lieu, 3 mat, 4 ngoai, 5 nhi, 6 noi,
#                7 rang-ham-mat, 8 san-phu-khoa, 9 sieu-am, 10 tai-mui-hong,
#                11 tam-than, 12 xet-nghiem, 13 xquang
#   medical_guide: 14 cao-huyet-ap, 15 ho-van-tim
#   policy: 16 kham-tong-quat, 17 ngoai-khoa, 18 nha-khoa, 19 san-sieu-am,
#           20 xet-nghiem, 21 xquang, 22 quy-trinh-kham-7-buoc
cases:
  # --- clinic_info (13 docs seeded) ---
  - query: "Phòng khám mở cửa mấy giờ"
    category: clinic_info
    relevant_knowledge_ids: [1]  # gioi-thieu — giờ hoạt động 07h30-17h00. Rank #2 (hours line repeated in every khoa doc footer), vẫn nằm trong top-5.
  - query: "Khoa da liễu điều trị những bệnh gì"
    category: clinic_info
    relevant_knowledge_ids: [2]  # rank #1 (nấm da, viêm da, zona, ghẻ)
  - query: "Khoa mắt chữa những bệnh nào"
    category: clinic_info
    relevant_knowledge_ids: [3]  # rank #1 (cận thị, glaucoma, đục thủy tinh thể)
  - query: "Khoa nhi khám các bệnh gì cho trẻ em"
    category: clinic_info
    relevant_knowledge_ids: [5]  # rank #1 (tay chân miệng, sởi, TMH trẻ em)
  - query: "Khoa siêu âm có những dịch vụ gì"
    category: clinic_info
    relevant_knowledge_ids: [9]  # rank #1 (siêu âm tuyến giáp, ổ bụng, thai 2D/4D)
  - query: "Khoa sản phụ khoa có khám thai không"
    category: clinic_info
    relevant_knowledge_ids: [8]  # rank #1 (khám thai, quản lý thai sản, soi cổ tử cung)
  - query: "Khoa tai mũi họng điều trị viêm xoang viêm tai không"
    category: clinic_info
    relevant_knowledge_ids: [10]  # rank #1 (viêm xoang, viêm tai, nạo VA)
  - query: "Chụp CT Cone Beam làm ở khoa nào"
    category: clinic_info
    relevant_knowledge_ids: [13]  # rank #1 (khoa X-Quang — CT Cone Beam)
  - query: "Khoa răng hàm mặt có chỉnh nha và điều trị tủy răng không"
    category: clinic_info
    relevant_knowledge_ids: [7]  # rank #1 (chỉnh nha, điều trị tủy răng)
  - query: "Khoa xét nghiệm làm những xét nghiệm gì"
    category: clinic_info
    relevant_knowledge_ids: [12]  # rank #1 (huyết học, sinh hóa, vi sinh, nước tiểu)
  # --- medical_guide (2 docs seeded) ---
  - query: "Huyết áp bao nhiêu thì được coi là cao huyết áp"
    category: medical_guide
    relevant_knowledge_ids: [14]  # rank #1 (≥140/90 mmHg)
  - query: "Dấu hiệu nhận biết hở van tim là gì"
    category: medical_guide
    relevant_knowledge_ids: [15]  # rank #1 (khó thở gắng sức, phù chân, hở van hai lá/ba lá)
  # --- policy (7 docs seeded) ---
  - query: "Xét nghiệm tổng phân tích tế bào máu giá bao nhiêu"
    category: policy
    relevant_knowledge_ids: [20]  # rank #1 (bảng giá xét nghiệm — 150.000đ)
  - query: "Cắt u lành phần mềm chi phí bao nhiêu"
    category: policy
    relevant_knowledge_ids: [17]  # rank #1 (bảng giá ngoại khoa — từ 1.200.000đ)
  - query: "Đo chỉ số cơ thể giá bao nhiêu"
    category: policy
    relevant_knowledge_ids: [16]  # rank #1 (bảng giá khám tổng quát — 50.000đ)
  - query: "Chích áp xe tầng sinh môn giá bao nhiêu"
    category: policy
    relevant_knowledge_ids: [19]  # rank #1 (bảng giá sản & siêu âm — 900.000đ)
  - query: "Quy trình khám sức khỏe gồm mấy bước"
    category: policy
    relevant_knowledge_ids: [22]  # rank #1 (quy trình 7 bước)
