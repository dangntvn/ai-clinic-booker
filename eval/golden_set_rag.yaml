# Golden set for retrieval evaluation (Hit Rate@k, MRR — ARCH-001 §7).
# Each case: a query, the category to search, and the knowledge_id(s) that
# should appear in the top-k results.
#
# Patched 2026-07-08 (TASK-026) — IMPORTANT FINDING, read before trusting this
# file: these 11 queries were authored speculatively (TASK-015) before any
# real knowledge_base content existed. Now that TASK-025's real content from
# phongkham5sao.vn is seeded+published (22 rows, ids 1-22) and tested with the
# actual retrieval path (embed_batch + data/qdrant_client.search, same code
# search_knowledge_base uses), only **1 of 11** queries has genuine topical
# support in the real content collected from this source. The other 10 ask
# about topics phongkham5sao.vn's public pages simply don't cover (BHYT,
# cancellation policy, parking, Tet holiday hours, general-checkup promos,
# pre-test fasting, abdominal ultrasound prep, colonoscopy prep — see
# eval/data_requirements.md §5 and TASK-025's Attempt log for the source-side
# gaps). Their `relevant_knowledge_ids` are intentionally left `[]` (no real
# id fabricated) rather than force-fit to an unrelated top-scored id.
#
# Secondary finding: settings.similarity_threshold (0.5) is lenient enough
# that search_knowledge_base still returns a "grounded" (non-empty) result
# for every one of these 10 uncovered queries — the top hits are simply the
# closest available Vietnamese medical/pricing text, not an actual answer.
# This is a plausible real product bug (over-eager grounding) worth a formal
# faithfulness-metric check in TASK-028, not something TASK-026 can fix.
#
# Recommendation for TASK-027: don't try to patch the 10 uncovered queries
# with real ids — write new RAG test queries grounded in the content that
# actually exists (e.g. real pricing/department topics from the 22 seeded
# rows), per TASK-023's data-first philosophy. Treat these 10 as deprecated
# rather than "fixed".
