  - "Trang khoa 'Khoa Nội Tổng Hợp' (https://phongkham5sao.vn/chuyen-khoa-y-te/khoa-noi/) nhắc tên bác sĩ thứ 3 'Phạm Quốc Cường', nhưng người này KHÔNG xuất hiện trong danh sách 15 bác sĩ thật ở /bac-si/ (trang 1, 2, hoặc form đặt lịch trang 3) — xác minh 2026-07-08. Không đưa vào doctors.yaml; ghi nhận đây là dữ liệu không nhất quán trên chính site nguồn, không phải bỏ sót của quy trình thu thập."
  - "9/14 giá trị enum SPECIALTIES có bác sĩ ứng viên từ nguồn này (1 cặp map gần đúng — xem specialty_note ở trên). 5/14 giá trị enum không có bác sĩ thật từ nguồn này: Tim mạch, Tiêu hóa, Hô hấp, Nội tiết, Tiết niệu – Nam khoa."
  - "bio hầu hết để null vì trang danh sách /bac-si/ chỉ hiện tên/chức danh/chuyên khoa cho đa số bác sĩ trang 1, không có đoạn mô tả — chỉ 3 bác sĩ trang 2 có trích dẫn kinh nghiệm rõ trong bio. Không tự viết thêm bio không có nguồn."
