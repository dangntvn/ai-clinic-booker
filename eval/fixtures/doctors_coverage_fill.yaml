# Coverage-fill doctors — SYNTHETIC / FABRICATED placeholder data (BUG-017).
#
# WHY THIS FILE EXISTS (kept SEPARATE from doctors.yaml on purpose):
#   doctors.yaml holds only doctors VERIFIED from the real source site
#   (phongkham5sao.vn) — its header forbids fabricating entries. That real
#   source only covers 9 of the 14 SPECIALTIES, leaving 5 with zero doctors
#   (Tim mạch, Tiêu hóa, Hô hấp, Nội tiết, Tiết niệu – Nam khoa) and 7 more
#   with only one. That gap is what caused BUG-017: booking a specialty with
#   no doctor made the agent report "không còn lịch trống" (no slots) for
#   every date, which reads as "always busy".
#
#   To guarantee every specialty is bookable, we seed extra doctors — but they
#   are INVENTED (name/title only, no real-world person), so they must NOT be
#   mixed into the verified-real doctors.yaml. They live here instead, clearly
#   labelled, and scripts/seed_eval_fixtures.py seeds them AFTER the real ones.
#
# COVERAGE TARGET: every one of the 14 SPECIALTIES ends up with >= 2 active
#   doctors (dal/doctor_repository.py::SPECIALTIES). doctors.yaml already gives
#   Nội tổng quát (2) and Cơ xương khớp (2); this file tops up the other 12:
#     - 2 each for the 5 zero-doctor specialties
#     - 1 each for the 7 single-doctor specialties (Nhi, Sản – Phụ khoa,
#       Thần kinh, Da liễu, Tai Mũi Họng, Mắt, Răng Hàm Mặt)
#
# ID STABILITY: seed_eval_fixtures.py seeds doctors.yaml first (ids 3–13, the
#   ids existing eval cases hardcode — e.g. REAL_DOCTOR_ID=3, Da liễu id=8,
#   Tai Mũi Họng id=9) then this file IN ORDER, so these get ids 14–30. Keep
#   the order below stable so a reseed reproduces the same ids.
#
# work_days: NOT set here on purpose — seed_eval_fixtures.py applies the same
#   fixed TEST_WORK_DAYS (Mon–Sat) to every seeded doctor, real or synthetic.

