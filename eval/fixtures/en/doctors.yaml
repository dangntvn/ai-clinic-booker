# Doctor fixture — COMPLETELY FICTIONAL/ANONYMIZED data (not real people), for eval use only.
# Fields match the model columns in `dal/doctor_repository.py::Doctor`.
# specialty MUST be one of the 14 snake_case codes in SPECIALTIES (dal/specialties.py, ADR-0026,
# 2026-07-22) — hard-validated in modules/doctor/services.py::validate_specialty.
# NOTE: `specialty` is an internal identifier code (e.g. "cardiology"), NOT a display name — it is
# fixed across all 3 language servers (vn/jp/en) by design (ADR-0026); the English display label
# shown to en-server patients comes from dal/specialties.py::specialty_display_name(), not this field.
# `full_name` (ADR-0024, 2026-07-22) is a fictional English/Western name — the en server has its
# own doctor roster, a different set of people from vn/jp, not a translation of the Vietnamese names.
# work_days: seed_eval_fixtures.py overrides this with a fixed TEST_WORK_DAYS for every doctor, this field is not read.
# fee: no sample value yet — left as null.

