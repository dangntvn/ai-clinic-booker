# Fixture bác sĩ — dữ liệu HOÀN TOÀN GIẢ ĐỊNH/ẨN DANH (không phải người thật), dùng riêng cho eval.
# Field khớp đúng tên cột model `dal/doctor_repository.py::Doctor`.
# specialty PHẢI là 1 trong 14 mã snake_case của SPECIALTIES (dal/specialties.py, ADR-0026,
# 2026-07-22) — validate cứng ở modules/doctor/services.py::validate_specialty. specialty là mã
# định danh nội bộ, KHÔNG phải nhãn hiển thị — tên hiển thị đến từ specialty_display_name().
# work_days: seed_eval_fixtures.py ghi đè bằng TEST_WORK_DAYS cố định cho mọi bác sĩ, không đọc từ field này.
# fee: chưa có giá trị mẫu — để null.
#
# JP fixture (ADR-0024, 2026-07-22): full_name là tên Nhật giả lập (không phải người thật,
# không phiên âm/dịch từ tên Việt — server jp có roster bác sĩ riêng, khác người với vn/en).
# title dịch sang tiếng Nhật y tế chuẩn; specialty là MÃ snake_case cố định (không đổi theo ngôn
# ngữ, ADR-0026) — tên hiển thị tiếng Nhật của khoa đến từ dal/specialties.py, không nằm ở đây.

